name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */6 * * *'  
  workflow_dispatch:  # Allows you to manually trigger the workflow

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps
      
      - name: Wake up Streamlit app
        run: |
          python -c "
          import asyncio
          from playwright.async_api import async_playwright
          
          async def wake_app():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  
                  # Replace with YOUR Streamlit app URL
                  await page.goto('https://fallflowers26.streamlit.app/', timeout=60000)
                  await page.wait_for_timeout(8000)
                  
                  # Check if app is sleeping and click wake button
                  wake_btn = page.get_by_role('button', name='Yes, get this app back up!')
                  if await wake_btn.count() > 0:
                      print('✅ App was sleeping - waking it up now...')
                      await wake_btn.click()
                      await page.wait_for_timeout(10000)
                  else:
                      print('✅ App is already awake')
                  
                  await browser.close()
          
          asyncio.run(wake_app())
          "
